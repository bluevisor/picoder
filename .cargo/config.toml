[target.arm-unknown-linux-musleabihf]
linker = "arm-unknown-linux-musleabihf-gcc"

# 32-bit Raspberry Pi OS on the Pi 2/3/4 (armv7l), static musl. Rust codegen
# targets ARMv7; the ARMv6 musl gcc is reused as linker (and CC for ring's C
# pieces — ARMv6 code runs fine on ARMv7), so no extra toolchain is needed.
# No target-cpu tune: a Pi 2 (Cortex-A7) must not get ARMv8-only encodings.
[target.armv7-unknown-linux-musleabihf]
linker = "arm-unknown-linux-musleabihf-gcc"

# Raspberry Pi 5 (Cortex-A76) native build, static musl. The Pi 5 is aarch64;
# running the 32-bit ARMv6 build under compat is fragile (it can segfault), so
# the Pi 5 gets its own native binary. Tunes codegen to the Pi 5's CPU and
# favors speed over size (it has GBs of RAM, unlike the Zero W). Only applies to
# this target, so the ARMv6 cross-build above is unaffected.
[target.aarch64-unknown-linux-musl]
linker = "aarch64-unknown-linux-musl-gcc"
rustflags = ["-C", "target-cpu=cortex-a76", "-C", "opt-level=3"]

# NVIDIA Jetson AGX Orin (Cortex-A78) native build. Unlike the Pis, the Orin can
# compile Rust itself, so it builds and runs its own native glibc binary — no
# Mac cross-compile needed: `cargo build --release` or `--profile jetson`.
# Tunes codegen to the A78 and overrides the size-first release profile with
# opt-level=3 for speed. Scoped to the native gnu triple, so the ARMv6 and
# Pi 5 musl cross-builds above are unaffected.
[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=cortex-a78", "-C", "opt-level=3"]
