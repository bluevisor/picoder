name: Release

# Build the five distributed binaries and attach them to the GitHub release for
# a tag. Runs automatically when a `v*` tag is pushed, and can be re-run by hand
# (workflow_dispatch) to backfill a release whose assets are missing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and upload assets for (e.g. v0.2.125)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Three static-musl Linux builds for the Raspberry Pi family, via `cross`
  # (the same targets CI already proves cross-compile).
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            asset: linux-arm64-pi345
          - target: arm-unknown-linux-musleabihf
            asset: linux-armv6-pizero
          - target: armv7-unknown-linux-musleabihf
            asset: linux-armv7-pi234-32bit
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --locked
      - name: Build (release)
        run: cross build --release --locked --target ${{ matrix.target }}
      - name: Package
        id: pkg
        env:
          # Untrusted (free-form dispatch input) — keep out of the command body.
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
        run: |
          case "$TAG" in v[0-9]*) ;; *) echo "refusing non-version tag: $TAG" >&2; exit 1 ;; esac
          NAME="picode-${TAG}-${ASSET}.tar.gz"
          tar -C "target/${TARGET}/release" -czf "$NAME" picode
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.pkg.outputs.tag }}
          NAME: ${{ steps.pkg.outputs.name }}
        run: gh release upload "$TAG" "$NAME" --clobber

  # Native Apple-Silicon and cross x86_64 macOS builds on a macOS runner.
  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset: macos-arm64
          - target: x86_64-apple-darwin
            asset: macos-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        id: pkg
        env:
          # Untrusted (free-form dispatch input) — keep out of the command body.
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
        run: |
          case "$TAG" in v[0-9]*) ;; *) echo "refusing non-version tag: $TAG" >&2; exit 1 ;; esac
          NAME="picode-${TAG}-${ASSET}.tar.gz"
          tar -C "target/${TARGET}/release" -czf "$NAME" picode
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.pkg.outputs.tag }}
          NAME: ${{ steps.pkg.outputs.name }}
        run: gh release upload "$TAG" "$NAME" --clobber
