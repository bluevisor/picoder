name: Release

# Build the five distributed binaries and attach them to the GitHub release for
# a tag. Runs automatically when a `v*` tag is pushed, and can be re-run by hand
# (workflow_dispatch) to backfill a release whose assets are missing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and upload assets for (e.g. v0.2.125)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Static-musl Linux builds via `cross`. Pi family + two CPU-tuned aarch64
  # builds for the NVIDIA Jetson boards. musl is fully static, so these run on
  # any aarch64 kernel regardless of the board's glibc version (the Nano's
  # JetPack 4 glibc 2.27 vs the Orin's 2.35) — a native glibc build would not.
  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            asset: linux-arm64-pi345
          - target: arm-unknown-linux-musleabihf
            asset: linux-armv6-pizero
          - target: armv7-unknown-linux-musleabihf
            asset: linux-armv7-pi234-32bit
          # Jetson Nano (Cortex-A57) and AGX Orin (Cortex-A78AE), CPU-tuned.
          # rustflags REPLACES the .cargo/config musl tuning, so opt-level=3 is
          # repeated; forwarded into the cross container via Cross.toml.
          - target: aarch64-unknown-linux-musl
            asset: linux-arm64-jetson-nano
            rustflags: "-C target-cpu=cortex-a57 -C opt-level=3"
          - target: aarch64-unknown-linux-musl
            asset: linux-arm64-jetson-orin
            rustflags: "-C target-cpu=cortex-a78ae -C opt-level=3"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Keyed by asset, not target: the three aarch64-musl builds share a
          # target triple but differ in rustflags, so they need separate caches.
          key: ${{ matrix.asset }}
      - name: Install cross
        run: cargo install cross --locked
      - name: Build (release)
        env:
          TARGET: ${{ matrix.target }}
          EXTRA_RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          # Only export RUSTFLAGS when this entry sets it; an empty RUSTFLAGS
          # would override (not merge with) the .cargo/config tuning and strip
          # the Pi builds' target-cpu. Forwarded into cross via Cross.toml.
          if [ -n "$EXTRA_RUSTFLAGS" ]; then export RUSTFLAGS="$EXTRA_RUSTFLAGS"; fi
          cross build --release --locked --target "$TARGET"
      - name: Package
        id: pkg
        env:
          # Untrusted (free-form dispatch input) — keep out of the command body.
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
        run: |
          case "$TAG" in v[0-9]*) ;; *) echo "refusing non-version tag: $TAG" >&2; exit 1 ;; esac
          NAME="picode-${TAG}-${ASSET}.tar.gz"
          tar -C "target/${TARGET}/release" -czf "$NAME" picode
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.pkg.outputs.tag }}
          NAME: ${{ steps.pkg.outputs.name }}
        run: gh release upload "$TAG" "$NAME" --clobber

  # Native Apple-Silicon and cross x86_64 macOS builds on a macOS runner.
  macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset: macos-arm64
          - target: x86_64-apple-darwin
            asset: macos-x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        id: pkg
        env:
          # Untrusted (free-form dispatch input) — keep out of the command body.
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
          ASSET: ${{ matrix.asset }}
        run: |
          case "$TAG" in v[0-9]*) ;; *) echo "refusing non-version tag: $TAG" >&2; exit 1 ;; esac
          NAME="picode-${TAG}-${ASSET}.tar.gz"
          tar -C "target/${TARGET}/release" -czf "$NAME" picode
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.pkg.outputs.tag }}
          NAME: ${{ steps.pkg.outputs.name }}
        run: gh release upload "$TAG" "$NAME" --clobber
